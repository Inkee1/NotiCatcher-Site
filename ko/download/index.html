<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotiCatcher - 다운로드</title>
    <meta name="description" content="NotiCatcher를 다운로드하고 무음 모드에서도 동작하는 키워드 알림을 시작하세요." />
    <link rel="canonical" href="https://noticatcher.com/ko/download/" />
    <link rel="alternate" hreflang="en" href="https://noticatcher.com/en/download/" />
    <link rel="alternate" hreflang="ko" href="https://noticatcher.com/ko/download/" />
    <link rel="alternate" hreflang="x-default" href="https://noticatcher.com/en/" />
    <base href="/ko/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/en/css/style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <nav class="navbar">
        <a href="/ko/" class="logo">
            <div class="logo-icon"><i class='bx bx-bell'></i></div>
            NotiCatcher
        </a>
        
        <button class="menu-toggle" id="mobile-menu-btn">
            <i class='bx bx-menu'></i>
        </button>

        <div class="nav-links" id="nav-links">
            <a href="/ko/">홈</a>
            <a href="/ko/price/">요금제</a>
            <a href="/ko/download/" class="active">다운로드</a>
            <a href="/ko/faq/">FAQ</a>
            <a href="/ko/myinfo/" id="auth-link" class="btn btn-glass" style="padding: 0.5rem 1.25rem;">로그인 / 내 정보</a>
            <a href="/en/download/" class="btn btn-glass" style="padding: 0.5rem 1.25rem;">EN</a>
        </div>
    </nav>

    <main class="hero" style="min-height: calc(100vh - 80px);">
        <div class="hero-content" style="max-width: 900px;">
            <div class="hero-badge">Get the app</div>
            <h1>NotiCatcher <br><span>다운로드</span></h1>
            <p>
                아래 버튼에서 스토어로 이동해 앱을 설치할 수 있습니다.
                (스토어 링크가 준비되지 않았다면, 임시로 영문 페이지에서 확인할 수 있어요.)
            </p>

            <div class="hero-actions">
                <a href="/en/download/" class="btn btn-primary" style="background: linear-gradient(135deg, #00C853, #64DD17); color: white;">
                    스토어 링크 보기 (영문) <i class='bx bx-right-arrow-alt'></i>
                </a>
                <a href="/ko/faq/" class="btn btn-glass">
                    자주 묻는 질문 <i class='bx bx-right-arrow-alt'></i>
                </a>
            </div>
        </div>
    </main>

    <script type="module" src="/en/js/firebase-config.js"></script>
    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
