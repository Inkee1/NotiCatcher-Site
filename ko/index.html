<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotiCatcher - Powerful Keyword Alert App</title>
    <meta name="description" content="중요한 알림을 놓치지 마세요. NotiCatcher는 무음 모드에서도 강력한 키워드 알림을 전달합니다." />
    <link rel="canonical" href="https://noticatcher.com/ko/" />
    <link rel="alternate" hreflang="en" href="https://noticatcher.com/en/" />
    <link rel="alternate" hreflang="ko" href="https://noticatcher.com/ko/" />
    <link rel="alternate" hreflang="x-default" href="https://noticatcher.com/en/" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Reuse EN assets -->
    <link rel="stylesheet" href="/en/css/style.css">
</head>
<body>
    <!-- Abstract Background Gradients -->
    <div class="bg-glow"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="/ko/" class="logo">
            <div class="logo-icon"><i class='bx bx-bell'></i></div>
            NotiCatcher
        </a>
        
        <button class="menu-toggle" id="mobile-menu-btn">
            <i class='bx bx-menu'></i>
        </button>

        <div class="nav-links" id="nav-links">
            <a href="/ko/" class="active">홈</a>
            <a href="/ko/price/">요금제</a>
            <a href="/ko/download/">다운로드</a>
            <a href="/ko/faq/">FAQ</a>
            <a href="/ko/myinfo/" id="auth-link" class="btn btn-glass" style="padding: 0.5rem 1.25rem;">로그인 / 내 정보</a>
            <a href="/en/" class="btn btn-glass" style="padding: 0.5rem 1.25rem;">EN</a>
        </div>
    </nav>

    <!-- Main Hero Section -->
    <main class="hero">
        <div class="hero-content">
            <div class="hero-badge">알림 관리의 새로운 기준</div>
            <h1>중요한 알림을 <br><span>절대 놓치지 마세요</span></h1>
            <p>
                무음 모드에서도 울리는 강력한 키워드 알림! <br>
                가족·지인 연락은 놓치고 싶지 않을 때, 코인·주식·금융의 핵심 신호를 놓치고 싶지 않을 때 <strong>NotiCatcher가 도와드립니다.</strong>
            </p>
            
            <div class="hero-actions">
                <a href="/ko/download/" class="btn btn-primary" style="background: linear-gradient(135deg, #00C853, #64DD17); color: white;">
                    <i class='bx bxl-play-store' style="font-size: 1.2rem;"></i> Google Play
                </a>
                <a href="/ko/download/" class="btn btn-primary" style="background: linear-gradient(135deg, #000000, #333333); color: white;">
                    <i class='bx bxl-apple' style="font-size: 1.2rem;"></i> App Store
                </a>
                <a href="/ko/price/" class="btn btn-glass">
                    요금제 보기 <i class='bx bx-right-arrow-alt'></i>
                </a>
            </div>

            
        </div>

        <div class="hero-visual">
            <div class="mockup-container">
                <div class="mockup-screen">
                    <img src="/img/main1.jpg" alt="NotiCatcher 앱 스크린샷" onerror="this.src='https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=600&auto=format&fit=crop';">
                </div>
            </div>

            <div class="floating-card fc-1">
                <div class="icon-box" style="background: rgba(236, 72, 153, 0.2); color: #f472b6;">
                    <i class='bx bx-message-rounded-dots'></i>
                </div>
                <div class="fc-text">
                    <h4>키워드 매칭!</h4>
                    <p>"비트코인 +5%"</p>
                </div>
            </div>

            <div class="floating-card fc-2">
                <div class="icon-box">
                    <i class='bx bx-volume-full'></i>
                </div>
                <div class="fc-text">
                    <h4>무음 모드 우회</h4>
                    <p>강제 알림 울림</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="/en/js/firebase-config.js"></script>
    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
